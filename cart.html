<!DOCTYPE html>
<html lang="mn">
<head>

    <meta name="keywords" content="Хоолны захиалга, хоол, захиалга, yuidehuu, yu ideh uu, yu, ideh, юу идэх үү, идэх">

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" media="screen and (max-width: 768px)" href="./css/mobile.css">
    <link rel="stylesheet" media="screen and (min-width: 1100px)" href="./css/widescreen.css">

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
    <title>Yu Ideh uu? | Сагс</title>
</head>
<body>
          <!-- Үндсэн цэс -->
    <nav id="navbar">
        <div class="container nav-container">
            <h1 class="logo">
                <span class="tom-text">
                    <i class="fa-solid fa-utensils"></i> Yu Ideh uu?
                </span>
            </h1>
            <ul class="nav-menu">
                <li><a href="cart.html"><i class="fa-solid fa-basket-shopping"></i></a></li>
                <li><a href="login.html"><i class="fa-regular fa-user"></i></a></li>
            </ul>
        </div>
    </nav>
    <a href="restaurant_detail.html" class="grey-button">Үргэлжлүүлэх</a>
    <section id="checkout" class="checkout">
        <h2 class="dund-text">Төлбөр төлөх</h2>
        <article class="address">
            <div class="address-header">
                <h3><i class="fa-solid fa-map-pin"></i>Хүргэх хаяг</h3>
            </div>
            <div class="address-content">
                <form class="address-form"> 
                    <label for="district">Дүүрэг</label>
                    <input type="text"
                    id="district"
                    name="district"
                    placeholder="Дүүргийн нэрийг оруулна уу.">
                </form>
                <form class="address-form"> 
                    <label for="long-address">Дэлгэрэнгүй хаяг</label>
                    <input type="text"
                    id="long-address"
                    name="long-address"
                    placeholder="Дэлгэрэнгүй хаягиййг оруулна уу.">
                </form>
                <form class="address-form"> 
                    <label for="apt-number">Орцны код</label>
                    <input type="text"
                    id="apt-number"
                    name="apt-number"
                    placeholder="Орцны код оруулна уу.">
                </form>
                <form class="address-form"> 
                    <label for="phone-number">Утасны дугаар</label>
                    <input type="number"
                    id="phone-number"
                    name="phone-number"
                    placeholder="Утасны дугаарыг оруулна уу.">
                </form>
                <form class="address-form"> 
                    <label for="extra-info">Нэмэлт мэдээлэл</label>
                    <input type="text"
                    id="extra-info"
                    name="extra-info"
                    placeholder="Нэмэлт мэдээллийг оруулна уу.">
                </form>
            </div>
        </article>
        <article class="payment">
            <div class="payment-header">
                <h3><i class="fa-regular fa-credit-card"></i>Төлбөр</h3>
            </div>
        </article>
    </section>
        <footer id="main-footer">
            <div class="footer-boxes">
                <div class="box bg-primary">
                    <i class="fa-solid fa-phone"></i>
                    <h3>Утасны дугаар</h3>
                    <p>99******</p>
                </div>

                <div class="box bg-light">
                    <i class="fa-solid fa-at"></i>
                    <h3>И-мэйл</h3>
                    <p>yu_idehuu@gmail.com</p>
                </div>
                <div class="box bg-primary">
                    <i class="fa-solid fa-location-dot"></i>
                    <h3>Хаяг</h3>
                    <p>Улаанбаатар, Баянзүрх дүүрэг, 4-р хороо, 032-р байр</p>
                </div>
            </div>
            <p class="footer-copy">&copy; 2026, Yu Ideh uu | Бүх эрх хуулиар хамгаалагдсан.</p>
    </footer>

</html>
